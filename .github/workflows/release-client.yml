name: Release Client

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: black-sea-client-macos-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: black-sea-client-macos-aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: black-sea-client-windows.exe
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: black-sea-client-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build client
        env:
          BLACK_SEA_SERVER_DEFAULT: wss://world.black-sea.tennander.se
        run: cargo build --release --bin client --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: matrix.runner != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/client ${{ matrix.binary }}

      - name: Rename binary (windows)
        if: matrix.runner == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/client.exe ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            black-sea-client-macos-x86_64
            black-sea-client-macos-aarch64
            black-sea-client-windows.exe
            black-sea-client-linux
