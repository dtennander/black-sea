name: Build, Publish, and Update Kustomize

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-publish-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # for pushing kustomization.yaml update
      packages: write # for pushing to ghcr.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: slug
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        run: |
          docker build -t ghcr.io/dtennander/black-sea:${{ steps.slug.outputs.sha }} .
          docker push ghcr.io/dtennander/black-sea:${{ steps.slug.outputs.sha }}

      - name: Update kustomization.yaml newTag
        run: |
          sed -i 's/newTag: .*/newTag: ${{ steps.slug.outputs.sha }}/' k8s/kustomization.yaml

      - name: Commit and push kustomization.yaml update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update kustomization.yaml with image ${{ steps.slug.outputs.sha }}"
          file_pattern: k8s/kustomization.yaml
