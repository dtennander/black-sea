apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: black-sea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/dtennander/black-sea.git"
    targetRevision: HEAD
    path: k8s
  destination:
    server: "https://kubernetes.default.svc"
    namespace: black-sea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
